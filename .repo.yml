# Baseline declarative state for Battle-Creek-LLC/repocat.
# Schema follows the repocat spec (s-repoman-github-repository-hardening-019dd45e).
#
# Notes for this repo specifically:
#   - Solo maintainer, so `required_reviews` is 0 (no second reviewer available
#     and admin self-bypass defeats the point of setting it to 1).
#   - No CI yet, so `required_status_checks` is empty. Add lint/test/etc. once
#     a workflow ships.
#   - Org-level controls (MFA, audit log streaming) are managed in a separate
#     org-scoped baseline, not here.

org: Battle-Creek-LLC

repos:
  repocat:
    branch_protection:
      branch: main
      required_reviews: 0
      dismiss_stale_reviews: true
      require_codeowners: false
      require_conversation_resolution: true
      require_linear_history: true
      required_status_checks: []
      block_force_push: true
      block_deletions: true
      signed_commits: true

    merge:
      allow_squash: true
      allow_merge_commit: false
      allow_rebase: false
      delete_branch_on_merge: true

    security:
      secret_scanning: true
      push_protection: true
      dependabot_security_updates: true
      dependency_graph: true   # L1: server-side toggle (auto-on for public repos)
      vulnerability_alerts: true

    required_files:
      - README.md
      - LICENSE
      - .gitignore

    actions:
      default_workflow_permissions: read
      pin_actions_to_sha: true
      require_dependency_review_action: true   # L3: workflow-level dep-review enforcement
