# Strict repocat baseline — every guardrail repocat knows how to enforce.
#
# Two approving reviews from CODEOWNERS, signed commits, dependency-review
# Action required, every step pinned to a SHA. Roughly maps to NIST 800-53
# High overlay touchpoints. Use for repos that ship security-sensitive code.
#
# Generated by `repocat init --preset strict`. Edit freely.

org: {{ORG}}

# Settings here apply to every repo under `repos:` below. Per-repo blocks
# overlay these defaults: scalars override, vec fields extend+dedupe, nested
# struct fields overlay field-by-field.
defaults:
  # Branch protection on the default branch (AC-3 access enforcement,
  # CM-3 configuration change control, SI-7 software integrity).
  branch_protection:
    branch: main
    required_reviews: 2
    dismiss_stale_reviews: true
    require_codeowners: true                  # CODEOWNERS approval required
    require_conversation_resolution: true
    require_linear_history: true
    block_force_push: true
    block_deletions: true
    signed_commits: true                      # require GPG/SSH-signed commits

  # Merge button options (CM-3 configuration change control).
  # Squash-only keeps main's history clean and matches require_linear_history.
  merge:
    allow_squash: true
    allow_merge_commit: false
    allow_rebase: false
    delete_branch_on_merge: true

  # Built-in security features (SI-2 flaw remediation, SI-4 monitoring).
  security:
    secret_scanning: true
    push_protection: true
    vulnerability_alerts: true
    dependabot_security_updates: true
    dependency_graph: true

  # GitHub Actions defaults (AC-6 least privilege, SR-3 supply chain).
  actions:
    default_workflow_permissions: read
    pin_actions_to_sha: true
    require_dependency_review_action: true    # PRs blocked on vulnerable new deps

  # Files repocat will check exist on the default branch (CM-2 baseline config).
  required_files:
    - README.md
    - LICENSE
    - .gitignore
    - SECURITY.md
    - CODEOWNERS

  # Require a CODEOWNERS file with at least one ownership rule (CM-3, AC-5).
  codeowners: true

# Add repos with `repocat repo add <name>`. Per-repo blocks may be empty (`{}`)
# to inherit defaults verbatim, or override individual fields.
repos: {}
