# Minimal repocat baseline — the smallest set of guardrails worth declaring.
#
# Use this preset when you want repocat to track configuration but not block
# day-to-day workflow. Reviews are not required, force pushes are blocked,
# secret scanning is on. Roughly maps to NIST 800-53 Low overlay touchpoints.
#
# Generated by `repocat init --preset minimal`. Edit freely.

org: {{ORG}}

# Settings here apply to every repo under `repos:` below. Per-repo blocks
# overlay these defaults: scalars override, vec fields extend+dedupe, nested
# struct fields overlay field-by-field.
defaults:
  # Branch protection on the default branch (AC-3 access enforcement,
  # CM-3 configuration change control).
  branch_protection:
    branch: main
    required_reviews: 0                       # solo-friendly; bump for teams
    dismiss_stale_reviews: false
    require_codeowners: false
    require_conversation_resolution: false
    require_linear_history: false
    block_force_push: true                    # prevent history rewrite on main
    block_deletions: true                     # prevent accidental branch deletion
    signed_commits: false

  # Merge button options (CM-3 configuration change control).
  merge:
    allow_squash: true
    allow_merge_commit: true
    allow_rebase: true
    delete_branch_on_merge: true

  # Built-in security features (SI-2 flaw remediation, SI-4 monitoring).
  security:
    secret_scanning: true                     # detect committed secrets
    push_protection: true                     # block secret pushes at the door
    vulnerability_alerts: true
    dependabot_security_updates: false        # off by default — opt in per repo
    dependency_graph: true

  # GitHub Actions defaults (AC-6 least privilege, SR-3 supply chain).
  actions:
    default_workflow_permissions: write       # GitHub default; tighten in standard/strict
    pin_actions_to_sha: false
    require_dependency_review_action: false

  # Files repocat will check exist on the default branch (CM-2 baseline config).
  required_files:
    - README.md
    - LICENSE

# Add repos with `repocat repo add <name>`. Per-repo blocks may be empty (`{}`)
# to inherit defaults verbatim, or override individual fields.
repos: {}
