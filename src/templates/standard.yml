# Standard repocat baseline — the recommended starting point for most repos.
#
# Requires one approving review, restricts merges to squash, pins Actions to
# SHAs, and enables Dependabot security updates. Roughly maps to NIST 800-53
# Moderate overlay touchpoints.
#
# Generated by `repocat init --preset standard`. Edit freely.

org: {{ORG}}

# Settings here apply to every repo under `repos:` below. Per-repo blocks
# overlay these defaults: scalars override, vec fields extend+dedupe, nested
# struct fields overlay field-by-field.
defaults:
  # Branch protection on the default branch (AC-3 access enforcement,
  # CM-3 configuration change control).
  branch_protection:
    branch: main
    required_reviews: 1
    dismiss_stale_reviews: true               # stale approvals invalidate on new pushes
    require_codeowners: false
    require_conversation_resolution: true     # all PR threads resolved before merge
    require_linear_history: true              # no merge commits on main
    block_force_push: true
    block_deletions: true
    signed_commits: false

  # Merge button options (CM-3 configuration change control).
  # Squash-only keeps main's history clean and matches require_linear_history.
  merge:
    allow_squash: true
    allow_merge_commit: false
    allow_rebase: false
    delete_branch_on_merge: true

  # Built-in security features (SI-2 flaw remediation, SI-4 monitoring).
  security:
    secret_scanning: true
    push_protection: true
    vulnerability_alerts: true
    dependabot_security_updates: true         # auto-PR for vulnerable deps
    dependency_graph: true

  # GitHub Actions defaults (AC-6 least privilege, SR-3 supply chain).
  actions:
    default_workflow_permissions: read        # workflows must opt in to write scopes
    pin_actions_to_sha: true                  # prevent tag-rewrite supply chain attacks
    require_dependency_review_action: false

  # Files repocat will check exist on the default branch (CM-2 baseline config).
  required_files:
    - README.md
    - LICENSE
    - .gitignore
    - SECURITY.md

# Add repos with `repocat repo add <name>`. Per-repo blocks may be empty (`{}`)
# to inherit defaults verbatim, or override individual fields.
repos: {}
